services:
  frontend:
    image: node:22-alpine
    container_name: cinematch-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4200:4200"
    command: sh -c "echo 'Frontend container ready' && tail -f /dev/null"
    networks:
      - cinematch-net
    depends_on:
      - gateway
      - core

  gateway:
    image: node:22-alpine
    container_name: cinematch-gateway
    working_dir: /app
    volumes:
      - ./gateway:/app
    ports:
      - "3000:3000"
    command: sh -c "echo 'Gateway container ready' && tail -f /dev/null"
    networks:
      - cinematch-net
    depends_on:
      users_db:
        condition: service_healthy


  core:
    build: ./core
    container_name: cinematch-core
    working_dir: /app
    volumes:
      - ./core:/app
    ports:
      - "8000:8000"
    networks:
      - cinematch-net
    depends_on:
      movies_db:
        condition: service_healthy

  movies_db:
    image: postgres:15-alpine
    container_name: cinematch-movies-postgres
    restart: always
    environment:
      POSTGRES_USER: cinematch_movies_admin
      POSTGRES_PASSWORD: cinematch_movies_password
      POSTGRES_DB: cinematch_movies_db
      POSTGRES_HOST: movies_db
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cinematch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch_movies_admin -d cinematch_movies_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  users_db:
    image: postgres:15-alpine
    container_name: cinematch-users-postgres
    restart: always
    environment:
      POSTGRES_USER: cinematch_users_admin
      POSTGRES_PASSWORD: cinematch_users_password
      POSTGRES_DB: cinematch_users_db
    ports:
      - "5433:5433"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cinematch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch_users_admin -d cinematch_users_db"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  cinematch-net:
    driver: bridge

volumes:
  postgres-data:
    