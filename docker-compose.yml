services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinematch-frontend
    ports:
      - "4200:80"
    networks:
      - cinematch-net
    depends_on:
      - gateway
      - core 

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: cinematch-gateway
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run db:prepare && npm run dev"
    ports:
      - "3001:3000"
    volumes:
      - ./gateway:/app
      - gateway-node-modules:/app/node_modules
    depends_on:
      users_db:
        condition: service_healthy
      core:
        condition: service_started
      s3-storage:
        condition: service_started
    networks:
      - cinematch-net

  core:
    build: ./core
    container_name: cinematch-core
    working_dir: /app
    command: sh -c "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    # for new revision (When change database models)
    # docker compose exec core uv run alembic revision --autogenerate -m "your_message"
    # docker compose restart core
    # docker compose exec core uv run alembic upgrade head
    volumes:
      - ./core:/app
    ports:
      - "8000:8000"
    networks:
      - cinematch-net
    depends_on:
      movies_db:
        condition: service_healthy

  movies_db:
    image: postgres:15-alpine
    container_name: cinematch-movies-postgres
    restart: always
    environment:
      POSTGRES_USER: cinematch_movies_admin
      POSTGRES_PASSWORD: cinematch_movies_password
      POSTGRES_DB: cinematch_movies_db
      POSTGRES_HOST: movies_db
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres-movies-data:/var/lib/postgresql/data
    networks:
      - cinematch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch_movies_admin -d cinematch_movies_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  users_db:
    image: postgres:15-alpine
    container_name: cinematch-users-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinematch_users_admin
      POSTGRES_PASSWORD: cinematch_users_password
      POSTGRES_DB: cinematch_users_db
    ports:
      - "5433:5432"
    volumes:
      - users-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch_users_admin -d cinematch_users_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cinematch-net

  # S3 Compatible Object Storage
  s3-storage:
    image: minio/minio:latest
    container_name: cinematch-s3
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000" # API Port (FastAPI and Frontend talk to this)
      - "9001:9001" # Web UI Port (For browser)
    command: server /data --console-address ":9001"
    volumes:
      - s3-data:/data
    networks:
      - cinematch-net

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cinematch-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rmq_admin
      RABBITMQ_DEFAULT_PASS: rmq_password
    ports:
      - "5672:5672"   # AMQP protocol port (FastAPI talks to this)
      - "15672:15672" # Web UI port (For browser)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - cinematch-net

networks:
  cinematch-net:
    driver: bridge

volumes:
  postgres-movies-data:
  users-postgres-data:
  s3-data:
  rabbitmq-data:
  gateway-node-modules:
