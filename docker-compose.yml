services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinematch-frontend
    ports:
      - "4200:80"
    networks:
      - cinematch-net
    depends_on:
      - gateway
      - core 

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: cinematch-gateway
    restart: unless-stopped
    working_dir: /app
    environment:
      PORT: "3000"
      NODE_ENV: development
      JWT_SECRET: dev_secret_change_me
      JWT_EXPIRES_IN: "1h"
      POSTGRES_USER: cinematch_users_admin
      POSTGRES_PASSWORD: cinematch_users_password
      POSTGRES_DB: cinematch_users_db
      POSTGRES_HOST: users_db
      POSTGRES_PORT: "5432"
      CORE_SERVICE_URL: "http://core:8000"
    ports:
      - "3001:3000"
    volumes:
      - ./gateway:/app
      - /app/node_modules
    depends_on:
      users_db:
        condition: service_healthy
      core:
        condition: service_started
    networks:
      - cinematch-net

  core:
    build: ./core
    container_name: cinematch-core
    working_dir: /app
    volumes:
      - ./core:/app
    ports:
      - "8000:8000"
    networks:
      - cinematch-net
    depends_on:
      movies_db:
        condition: service_healthy

  movies_db:
    image: postgres:15-alpine
    container_name: cinematch-movies-postgres
    restart: always
    environment:
      POSTGRES_USER: cinematch_movies_admin
      POSTGRES_PASSWORD: cinematch_movies_password
      POSTGRES_DB: cinematch_movies_db
      POSTGRES_HOST: movies_db
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres-movies-data:/var/lib/postgresql/data
    networks:
      - cinematch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch_movies_admin -d cinematch_movies_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  users_db:
    image: postgres:15-alpine
    container_name: cinematch-users-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinematch_users_admin
      POSTGRES_PASSWORD: cinematch_users_password
      POSTGRES_DB: cinematch_users_db
    ports:
      - "5433:5432"
    volumes:
      - users-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch_users_admin -d cinematch_users_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cinematch-net

networks:
  cinematch-net:
    driver: bridge

volumes:
  postgres-movies-data:
  users-postgres-data:
    
