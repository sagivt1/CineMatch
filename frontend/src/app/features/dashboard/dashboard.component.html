<main class="dashboard-page">
    <header class="dashboard-header">
        <div class="header-brand">
            <span class="brand-icon">🎬</span>
            <span class="brand-name">CineMatch</span>
        </div>

        <div class="header-user">
            @if (currentUser()) {
            <span class="user-greeting">Welcome, {{ currentUser()!.displayName }}</span>
            }
            <button id="logout-btn" class="btn-logout" (click)="logout()">Sign out</button>
        </div>
    </header>

    <section class="dashboard-hero">
        <h2 class="hero-title">Your Dashboard</h2>
        <p class="hero-subtitle">
            Movie recommendations and catalog features are coming in Step 2. Stay tuned! 🍿
        </p>
    </section>
</main>
