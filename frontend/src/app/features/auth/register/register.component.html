<app-auth-layout [isSignIn]="false">
    <div class="auth-form-header">
        <h1 class="auth-form-title">Create an account</h1>
        <p class="auth-form-subtitle">Enter your details below to sign up</p>
    </div>

    @if (errorMessage()) {
    <div class="error-banner" role="alert"
        style="margin-bottom: var(--spacing-md); color: #ff4444; font-size: 0.875rem; text-align: center;">
        {{ errorMessage() }}
    </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="auth-form">
        <div class="auth-form-group">
            <label class="auth-label" for="register-name">Full Name</label>
            <input id="register-name" class="auth-input" type="text" formControlName="displayName"
                placeholder="John Doe" autocomplete="name" />
        </div>

        <div class="auth-form-group">
            <label class="auth-label" for="register-email">Email</label>
            <input id="register-email" class="auth-input" type="email" formControlName="email"
                placeholder="m@example.com" autocomplete="email" />
        </div>

        <div class="auth-form-group">
            <label class="auth-label" for="register-password">Password</label>
            <div class="auth-pwd-wrapper">
                <input id="register-password" class="auth-input auth-pwd-input"
                    [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Password"
                    autocomplete="new-password" />
                <button type="button" class="auth-pwd-toggle" (click)="togglePassword()"
                    aria-label="Toggle password visibility">
                    <lucide-icon [name]="showPassword() ? 'eye-off' : 'eye'" [size]="16"></lucide-icon>
                </button>
            </div>
        </div>

        <div class="auth-form-group">
            <label class="auth-label" for="confirm-password">Confirm Password</label>
            <div class="auth-pwd-wrapper">
                <input id="confirm-password" class="auth-input auth-pwd-input"
                    [type]="showConfirmPassword() ? 'text' : 'password'" formControlName="confirmPassword"
                    placeholder="Confirm Password" autocomplete="new-password" />
                <button type="button" class="auth-pwd-toggle" (click)="toggleConfirmPassword()"
                    aria-label="Toggle password visibility">
                    <lucide-icon [name]="showConfirmPassword() ? 'eye-off' : 'eye'" [size]="16"></lucide-icon>
                </button>
            </div>
        </div>

        <button id="register-submit" class="auth-button" type="submit" [disabled]="isLoading()">
            @if (isLoading()) {
            Creating account…
            } @else {
            Sign Up
            }
        </button>

        <div class="auth-footer">
            Already have an account?
            <a routerLink="/login" class="auth-link">Sign in</a>
        </div>

        <div class="auth-divider">
            <span>Or continue with</span>
        </div>

        <button type="button" class="auth-button outline" (click)="onSubmit()">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google"
                style="height: 1rem; margin-right: 0.5rem;" />
            Continue with Google
        </button>
    </form>
</app-auth-layout>
