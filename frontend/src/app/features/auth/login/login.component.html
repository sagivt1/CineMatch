<app-auth-layout [isSignIn]="true">
    <div class="auth-form-header">
        <h1 class="auth-form-title">Sign in to your account</h1>
        <p class="auth-form-subtitle">Enter your email below to sign in</p>
    </div>

    @if (errorMessage()) {
    <div class="error-banner" role="alert"
        style="margin-bottom: var(--spacing-md); color: #ff4444; font-size: 0.875rem; text-align: center;">
        {{ errorMessage() }}
    </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="auth-form">
        <div class="auth-form-group">
            <label class="auth-label" for="login-email">Email</label>
            <input id="login-email" class="auth-input" type="email" formControlName="email" placeholder="m@example.com"
                autocomplete="email" />
        </div>

        <div class="auth-form-group">
            <label class="auth-label" for="login-password">Password</label>
            <div class="auth-pwd-wrapper">
                <input id="login-password" class="auth-input auth-pwd-input"
                    [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Password"
                    autocomplete="current-password" />
                <button type="button" class="auth-pwd-toggle" (click)="togglePassword()"
                    aria-label="Toggle password visibility">
                    <lucide-icon [name]="showPassword() ? 'eye-off' : 'eye'" [size]="16"></lucide-icon>
                </button>
            </div>
        </div>

        <button id="login-submit" class="auth-button" type="submit" [disabled]="isLoading()">
            @if (isLoading()) {
            Signing in…
            } @else {
            Sign In
            }
        </button>

        <div class="auth-footer">
            Don't have an account?
            <a routerLink="/register" class="auth-link">Sign up</a>
        </div>

        <div class="auth-divider">
            <span>Or continue with</span>
        </div>

        <button type="button" class="auth-button outline" (click)="onSubmit()">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google"
                style="height: 1rem; margin-right: 0.5rem;" />
            Continue with Google
        </button>
    </form>
</app-auth-layout>
